name: Update 30th anniversary submodule

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6am UTC
  workflow_dispatch:        # Allow manual runs from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest from submodule
        run: git submodule update --remote 30th

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 30th
          git diff --cached --quiet || git commit -m "auto: update 30th anniversary submodule"
          git push
