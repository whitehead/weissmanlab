name: Update publications and people

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6am UTC
  workflow_dispatch:        # Allow manual runs from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pymed pyyaml pandas requests

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml _data/people.yml
          git diff --cached --quiet || git commit -m "auto: update publications and people data"
          git push
